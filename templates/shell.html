<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operações - Beehus</title>

  <!-- Restore dark mode before first paint -->
  <script>if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');</script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>

  <style>
    html.dark body { background-color: #111827; }
    .nav-link[data-active="true"] { background: rgba(255,255,255,0.1); color: white; font-weight: 500; }

    /* ── Sidebar collapse (rail pattern) ──────────────────────────────────
       Shrinks the sidebar to a 4rem icon-only rail instead of hiding it.
       Text labels are wrapped in <span class="nav-text"> and hidden when
       the body carries .sidebar-collapsed; icons stay centred. State is
       persisted to localStorage so the choice survives reloads. */
    aside.app-sidebar { transition: width .2s ease; overflow: hidden; }
    body.sidebar-collapsed aside.app-sidebar { width: 4rem; }
    #frame-container { transition: left .2s ease; }
    body.sidebar-collapsed #frame-container { left: 4rem !important; }

    /* Hide text labels and centre the SVG icons when collapsed. The nav
       items already use flex+gap-3 — we override gap and justify so a
       lone icon sits in the middle of the rail without leftover space. */
    body.sidebar-collapsed aside.app-sidebar .nav-text { display: none; }
    body.sidebar-collapsed aside.app-sidebar .nav-link,
    body.sidebar-collapsed aside.app-sidebar nav button,
    body.sidebar-collapsed aside.app-sidebar .nav-bottom button {
      justify-content: center;
      gap: 0;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }
    /* Logo: visible when expanded, hidden in the rail — but the wrapper
       keeps its original padding + border so the icons below don't shift
       up when collapsing. We hide the <img> only; the wrapper acts as a
       spacer so the nav stays vertically aligned in both states. */
    body.sidebar-collapsed aside.app-sidebar .logo-wrap img { visibility: hidden; }

    /* Section headers (Processamento / Validações / Upload correções) collapse
       to zero when the rail is active — otherwise the empty padding would
       leave odd gaps between blocks. */
    body.sidebar-collapsed aside.app-sidebar .nav-section-label { display: none; }

    /* Floating toggle. Always visible, always above the sidebar (z-30 vs
       sidebar z-20). Sits at the right edge of the sidebar in both states
       so it slides with the rail rather than jumping across the viewport. */
    #sidebar-toggle {
      position: fixed; top: 0.5rem; z-index: 30;
      width: 1.75rem; height: 1.75rem;
      display: flex; align-items: center; justify-content: center;
      border-radius: 0.375rem;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      cursor: pointer;
      transition: left .2s ease, background-color .15s ease;
      left: calc(14rem - 2.25rem);
    }
    #sidebar-toggle:hover { background: rgba(255,255,255,0.18); color: #fff; }
    body.sidebar-collapsed #sidebar-toggle { left: calc(4rem - 2.25rem); }
    /* Flip the chevron based on state. */
    body.sidebar-collapsed #sidebar-toggle .chev { transform: rotate(180deg); }
    #sidebar-toggle .chev { transition: transform .2s ease; }

  </style>
</head>

  <!-- ── Iframe container (fixed position for bulletproof sizing) ──────────────
       `left` is set in CSS so the sidebar-collapsed body class can override
       it cleanly via a transition. -->
  <div id="frame-container" style="position:fixed;top:0;right:0;bottom:0;left:14rem;overflow:hidden;"></div>

  <script>
    /* ── Page registry ────────────────────────────────────────────────────────── */
    const PAGES = {
      controlpanel:             '/controlpanel',
      painel:                   '/painel',
      conciliacao:              '/conciliacao',
      validacao_rentabilidades: '/validacao-rentabilidades',
      posicoes:                 '/posicoes',
      caixa:                    '/caixa',
      correcoes:                '/correcoes',
      // `stripping` é o novo entry-point oficial do sidebar (Position
      // Stripping + Fatiar carteira) — usa os mesmos partials que o chip
      // "Stripping" do Painel de Controle. `excecoes` segue mapeado para
      // backwards-compat de bookmarks / URL direta (renderiza a tela
      // antiga em excecoes.html, com o botão "Ajustes day-trade").
      stripping:                '/stripping',
      excecoes:                 '/excecoes',
      repetir_posicoes:         '/repetir-posicoes',
      precificacao:             '/precificacao',
      fundos:                   '/fundos',
      beehus:                   '/beehus',
      parceiro:                 '/parceiro',
      settings:                 '/settings',
      setup:                    '/setup',
    };

    const PATH_TO_KEY = {};
    for (const [k, v] of Object.entries(PAGES)) PATH_TO_KEY[v] = k;

    const _iframes  = {};
    const _lastDeep = {};   // per-page deep view (e.g. {beehus: 'delete-prov'})
    let _activePage = null;

    /* ── URL-hash format: `#<key>` or `#<key>/<deepView>` ─────────────────────── */
    function _parseHash() {
      const raw = location.hash.slice(1);
      const slash = raw.indexOf('/');
      if (slash < 0) return {key: raw, deep: ''};
      return {key: raw.slice(0, slash), deep: raw.slice(slash + 1)};
    }
    function _writeHash(key, deep) {
      const target = deep ? `${key}/${deep}` : key;
      if (location.hash.slice(1) !== target) {
        // replaceState avoids a hashchange event firing for our own write.
        history.replaceState(null, '', '#' + target);
      }
    }

    /* ── Navigation ───────────────────────────────────────────────────────────── */
    function navigateTo(key, extraParams) {
      if (!(key in PAGES)) return;

      // Hide all iframes
      for (const f of Object.values(_iframes)) f.style.display = 'none';

      const deep = _lastDeep[key] || '';
      const base = PAGES[key] + '?_frame=1';
      // Append the deep hash to the iframe URL so state survives any reload
      // of the iframe (and the very first creation after a full page reload).
      // Drill-downs with extraParams ignore the deep hash by design — they're
      // an explicit context switch.
      const url  = extraParams
        ? `${base}&${extraParams}`
        : (deep ? `${base}#${deep}` : base);

      if (!_iframes[key]) {
        // First visit — create and load iframe
        const iframe = document.createElement('iframe');
        iframe.src = url;
        iframe.style.cssText = 'width:100%;height:100%;border:none;display:block';
        iframe.addEventListener('load', () => syncDarkToFrame(iframe));
        document.getElementById('frame-container').appendChild(iframe);
        _iframes[key] = iframe;
      } else if (extraParams) {
        // Drill-down with new context — reload iframe
        _iframes[key].src = url;
      }
      // else: just show the existing iframe (state preserved)

      _iframes[key].style.display = 'block';
      _activePage = key;
      _writeHash(key, _lastDeep[key]);
      updateSidebar(key);
    }

    /* ── Sidebar highlight ────────────────────────────────────────────────────── */
    function updateSidebar(key) {
      document.querySelectorAll('.nav-link').forEach(el => {
        el.dataset.active = (el.dataset.page === key).toString();
      });
    }

    /* ── Dark mode ────────────────────────────────────────────────────────────── */
    function toggleDark() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      _updateToggleUI(isDark);
      for (const f of Object.values(_iframes)) syncDarkToFrame(f, isDark);
    }

    function syncDarkToFrame(iframe, isDark) {
      isDark = isDark ?? document.documentElement.classList.contains('dark');
      try { iframe.contentDocument.documentElement.classList.toggle('dark', isDark); } catch (e) {}
    }

    function _updateToggleUI(isDark) {
      document.getElementById('icon-moon').classList.toggle('hidden', isDark);
      document.getElementById('icon-sun').classList.toggle('hidden', !isDark);
      document.getElementById('dark-label').textContent = isDark ? 'Modo Claro' : 'Modo Escuro';
    }
    _updateToggleUI(document.documentElement.classList.contains('dark'));

    /* ── Beehus Token / Log sidebar buttons ──────────────────────────────────
       The visible buttons live in this shell; the modals live inside the
       active iframe (templates/controlpanel.html or templates/beehus_console.html).
       Clicks postMessage the iframe to open the right modal; the iframe
       postMessages back with state changes so the badge text + count stay
       in sync. */
    function _activeFrame() {
      return _activePage && _iframes[_activePage] || null;
    }
    function _postToActive(msg) {
      const f = _activeFrame();
      if (f && f.contentWindow) f.contentWindow.postMessage(msg, '*');
    }
    function openBeehusToken() { _postToActive({type: 'beehus-shell-cmd', cmd: 'open-token'}); }
    function openBeehusLog()   { _postToActive({type: 'beehus-shell-cmd', cmd: 'open-log'}); }

    /* ── Cross-frame messaging ────────────────────────────────────────────────── */
    window.addEventListener('message', e => {
      // Token state mirror from active iframe.
      if (e.data?.type === 'beehus-token-state') {
        const badge = document.getElementById('shell-token-badge');
        if (badge) {
          if (e.data.loaded) {
            badge.textContent = `${e.data.ageMin || 0}m`;
            badge.className = 'nav-text text-[10px] px-1.5 py-0.5 rounded bg-emerald-500/30 text-emerald-100';
            badge.title = `Token ativo há ${e.data.ageMin || 0} minuto(s).`;
          } else {
            badge.textContent = '—';
            badge.className = 'nav-text text-[10px] px-1.5 py-0.5 rounded bg-red-500/30 text-red-100';
            badge.title = 'Nenhum token carregado.';
          }
        }
        return;
      }
      // Log count mirror.
      if (e.data?.type === 'beehus-log-count') {
        const c = document.getElementById('shell-log-count');
        if (c) {
          c.textContent = String(e.data.total ?? 0);
          c.title = `${e.data.total ?? 0} chamada(s) nesta sessão`;
        }
        return;
      }
      // Cache message mirror (text + visibility).
      if (e.data?.type === 'beehus-cache-msg') {
        const el = document.getElementById('shell-cache-msg');
        if (el) {
          if (e.data.text) {
            el.textContent = e.data.text;
            el.classList.remove('hidden');
          } else {
            el.textContent = '';
            el.classList.add('hidden');
          }
        }
        return;
      }
      // Drill-down from a child page: navigate to another page with params.
      if (e.data?.type === 'navigate') {
        const key = PATH_TO_KEY[e.data.path];
        if (!key) return;
        // `deep` lets a child frame open the destination at a specific
        // sub-view without abusing the extraParams escape hatch (which
        // would force an iframe reload and skip the hash mechanism). We
        // pre-seed _lastDeep so navigateTo's normal path appends `#deep`
        // when it builds/reuses the iframe URL.
        if (typeof e.data.deep === 'string') {
          _lastDeep[key] = e.data.deep;
          // If the destination iframe already exists, force a reload so
          // the new deep view actually activates — without this, a cached
          // iframe just gets shown as-is.
          if (_iframes[key]) {
            const base = PAGES[key] + '?_frame=1';
            _iframes[key].src = e.data.deep ? `${base}#${e.data.deep}` : base;
          }
        }
        navigateTo(key, e.data.params);
        return;
      }
      // Deep-view change from a child: remember it so subsequent reloads /
      // sidebar round-trips restore the same view.
      if (e.data?.type === 'viewChange') {
        for (const [pkey, frame] of Object.entries(_iframes)) {
          if (frame.contentWindow === e.source) {
            const v = (e.data.view || '').toString();
            _lastDeep[pkey] = v;
            if (pkey === _activePage) _writeHash(pkey, v);
            return;
          }
        }
      }
    });

    /* ── Browser back / forward ───────────────────────────────────────────────── */
    window.addEventListener('hashchange', () => {
      const {key, deep} = _parseHash();
      const target = key || 'controlpanel';
      if (deep) _lastDeep[target] = deep;
      if (target !== _activePage && target in PAGES) navigateTo(target);
    });

    /* ── Sidebar collapse toggle ──────────────────────────────────────────────── */
    const SIDEBAR_KEY = 'shell.sidebarCollapsed';
    function toggleSidebar() {
      const collapsed = !document.body.classList.contains('sidebar-collapsed');
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      try { localStorage.setItem(SIDEBAR_KEY, collapsed ? '1' : '0'); } catch (e) {}
    }
    // Restore sidebar collapse state from localStorage before first paint.
    try {
      if (localStorage.getItem(SIDEBAR_KEY) === '1') {
        document.body.classList.add('sidebar-collapsed');
      }
    } catch (e) {}

    // Load the first page from URL hash (defaults to controlpanel).
    {
      const _init = _parseHash();
      const _initKey = _init.key || 'controlpanel';
      if (_init.deep) _lastDeep[_initKey] = _init.deep;
      navigateTo(_initKey);
    }
  </script>

</body>
</html>
